version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alkemio-mcp-server
    ports:
      - "1339:1339"
    environment:
      - NODE_ENV=production
      - MCP_SERVER_PORT=1339
      - API_ENDPOINT_PRIVATE_GRAPHQL=${API_ENDPOINT_PRIVATE_GRAPHQL}
      - AUTH_ADMIN_EMAIL=${AUTH_ADMIN_EMAIL}
      - AUTH_ADMIN_PASSWORD=${AUTH_ADMIN_PASSWORD}
      - AUTH_ORY_KRATOS_PUBLIC_BASE_URL=${AUTH_ORY_KRATOS_PUBLIC_BASE_URL}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:1339/', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  default:
    name: alkemio-mcp-network