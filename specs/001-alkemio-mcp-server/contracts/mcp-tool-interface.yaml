## Input Type Schemas

For complex inputs, tools MUST use Zod schemas that match GraphQL input types:

```typescript
// Example: Space creation input
const CreateSpaceInputSchema = z.object({
  profileData: z.object({
    displayName: z.string().min(1).max(100),
    tagline: z.string().max(500).optional(),
    description: z.string().optional(),
  }).optional(),
  collaborationData: z.object({
    communityPolicy: z.enum(['OPEN', 'MEMBERS_ONLY', 'PRIVATE']).optional(),
    leadOrganizations: z.array(z.string()).optional(),
    memberOrganizations: z.array(z.string()).optional(),
  }).optional(),
  contextData: z.object({
    vision: z.string().optional(),
    who: z.string().optional(),
    impact: z.string().optional(),
  }).optional(),
  spaceData: z.object({
    nameID: z.string().regex(/^[a-z0-9-]+$/),
    type: z.enum(['CHALLENGE', 'OPPORTUNITY', 'SPACE']).optional(),
  }),
});
```

## Error Contracts

All tools MUST handle these error types:

| Error Code | Condition | Response |
|------------|-----------|----------|
| `AUTH_ERROR` | Invalid/expired token | `{ error: "Authentication required" }` |
| `GRAPHQL_ERROR` | GraphQL execution error | `{ errors: [...] }` from API |
| `VALIDATION_ERROR` | Invalid input schema | `{ error: "Invalid input: <details>" }` |
| `NETWORK_ERROR` | API unreachable | `{ error: "Connection failed" }` |