| `activity-log-on-collaboration` | `activityLogOnCollaboration` | `{ queryData: ActivityLogInput }` | `ActivityLogEntry[]` |
| `explore-spaces` | `exploreSpaces` | `{ options?: ExploreSpacesInput }` | `Space[]` |
| `lookup-entities` | `lookup` | `{}` | `LookupQueryResults` |
| `lookup-by-name` | `lookupByName` | `{}` | `LookupByNameQueryResults` |
| `get-current-user` | `me` | `{}` | `MeQueryResults` |
| `get-organization` | `organization` | `{ ID: UUID }` | `Organization` |
| `list-organizations` | `organizations` | `{ filter?, limit?, random? }` | `Organization[]` |
| `get-space` | `space` | `{ ID: UUID! }` | `Space` |
