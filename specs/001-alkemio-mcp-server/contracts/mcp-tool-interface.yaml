# MCP Tool Contracts

## Tool Interface Specification

Each MCP tool MUST follow this interface:

```typescript
interface MCPTool<TInput> {
  name: string;           // kebab-case identifier
  description: string;   // human-readable purpose
  schema: z.ZodSchema<TInput>;  // input validation
  execute(input: TInput, context?: FrameworkContext): Promise<Output>;
}
```

