# Kubernetes Deployment Contract

## Resources

### Deployment

```yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alkemio-mcp-server
  labels:
    app: alkemio-mcp-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: alkemio-mcp-server
  template:
    metadata:
      labels:
        app: alkemio-mcp-server
      annotations:
        traefik.io/pod.discover: "true"
    spec:
      containers:
        - name: mcp-server
          image: alkemio-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1339
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: MCP_SERVER_PORT
              value: "1339"
            - name: API_ENDPOINT_PRIVATE_GRAPHQL
              valueFrom:
                secretKeyRef:
                  name: alkemio-mcp-secrets
                  key: graphql-endpoint
            - name: AUTH_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: alkemio-mcp-secrets
                  key: admin-email
            - name: AUTH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alkemio-mcp-secrets
                  key: admin-password
            - name: AUTH_ORY_KRATOS_PUBLIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: alkemio-mcp-secrets
                  key: kratos-url
          livenessProbe:
            httpGet:
              path: /
              port: 1339
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 1339
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
```

### Service

```yaml
apiVersion: v1
kind: Service
metadata:
  name: alkemio-mcp-server
  labels:
    app: alkemio-mcp-server
  annotations:
    traefik.io/service.nativelb: "false"
spec:
  type: ClusterIP
  ports:
    - name: http-mcp
      port: 1339
      targetPort: 1339
      protocol: TCP
  selector:
    app: alkemio-mcp-server
```

### Ingress

```yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alkemio-mcp-server
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.io/ingressclass: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.timeouts.read: "3600s"
    traefik.ingress.kubernetes.io/router.timeouts.write: "3600s"
    traefik.ingress.kubernetes.io/router.timeouts.idle: "3600s"
spec:
  ingressClassName: traefik
  rules:
    - host: mcp.alkemio.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alkemio-mcp-server
                port:
                  number: 1339
```

### Secret (External)

```yaml
apiVersion: v1
kind: Secret
metadata:
  name: alkemio-mcp-secrets
type: Opaque
stringData:
  graphql-endpoint: "https://api.alkemio.example.com/api/private/non-interactive/graphql"
  admin-email: "admin@example.com"
  admin-password: "${KRATOS_ADMIN_PASSWORD}"
  kratos-url: "https://api.alkemio.example.com/ory/kratos/public"
```

## Middleware (Optional)

```yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: alkemio-mcp-rate-limit
spec:
  rateLimit:
    average: 100
    burst: 200
    period: "1s"
```

## Dependencies

- Traefik Ingress Controller with version >= 2.10
- cert-manager for TLS certificate management
- Kubernetes version >= 1.21