# Docker Container Contract

## Base Image

```dockerfile
# syntax=docker/dockerfile:1.4

# Stage 1: Build
FROM node:20-slim AS builder
WORKDIR /app

# Install dependencies
COPY package*.json ./
RUN npm ci --only=production

# Copy TypeScript source
COPY tsconfig.json ./
COPY src ./src

# Build TypeScript
RUN npm run build

# Stage 2: Runtime
FROM node:20-slim AS runtime
WORKDIR /app

# Copy build artifacts from builder
COPY --from=builder /app/dist ./dist
COPY --from=builder /app/node_modules ./node_modules
COPY --from=builder /app/schema.graphql ./
COPY --from=builder /app/package*.json ./

# Environment
ENV NODE_ENV=production
ENV MCP_SERVER_PORT=1339

# Health check
HEALTHCHECK --interval=30s --timeout=5s --start-period=5s --retries=3 \
    CMD node -e "require('http').get('http://localhost:1339/', r => process.exit(r.statusCode === 200 ? 0 : 1))"

# Use node user (UID 1000)
USER node

EXPOSE 1339

CMD ["node", "dist/index.js"]
```

## Build Commands

```bash
# Build image
docker build -t alkemio-mcp:latest .

# Run locally
docker run -p 1339:1339 \
  -e API_ENDPOINT_PRIVATE_GRAPHQL="http://localhost:3000/api/private/non-interactive/graphql" \
  -e AUTH_ADMIN_EMAIL="admin@alkem.io" \
  -e AUTH_ADMIN_PASSWORD="test" \
  -e AUTH_ORY_KRATOS_PUBLIC_BASE_URL="http://localhost:3000/ory/kratos/public/" \
  alkemio-mcp:latest
```

## Image Properties

| Property | Value |
|----------|-------|
| Base Image | node:20-slim |
| Exposed Port | 1339 |
| User | node (UID 1000) |
| Health Check | HTTP / |
| Size | ~150MB |

## Requirements

- Docker version >= 20.10
- BuildKit enabled for multi-stage builds