apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alkemio-mcp-server
  labels:
    app: alkemio-mcp-server
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.io/ingressclass: traefik
    traefik.io/router.entrypoints: web,websecure
    traefik.io/router.tls: "true"
    traefik.io/router.timeouts.read: "3600s"
    traefik.io/router.timeouts.write: "3600s"
    traefik.io/router.timeouts.idle: "3600s"
spec:
  ingressClassName: traefik
  rules:
    - host: mcp.alkem.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alkemio-mcp-server
                port:
                  number: 1339
---
# TLS Configuration (requires cert-manager for automatic certificates)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alkemio-mcp-server-tls
  labels:
    app: alkemio-mcp-server
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.io/ingressclass: traefik
    cert-manager.io/issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - mcp.alkem.io
      secretName: alkemio-mcp-tls
  rules:
    - host: mcp.alkem.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alkemio-mcp-server
                port:
                  number: 1339